server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Хешированные файлы можно кешировать надолго. Если запрошена старая версия
  # после деплоя, возвращаем честный 404, а не index.html с MIME text/html.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # HTML всегда перепроверяется, чтобы открытая вкладка не ссылалась на чанки
  # предыдущей сборки после обновления контейнера.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
  }

  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
