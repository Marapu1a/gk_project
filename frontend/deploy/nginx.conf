server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # PDF.js loads its worker as an ES module. Alpine nginx does not map .mjs
  # consistently, and browsers reject module workers served as octet-stream.
  location ~* \.mjs$ {
    types {
      application/javascript mjs;
    }
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
  }

  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_http_version 1.1;
  }

  location / {
    try_files $uri /index.html;
  }
}
